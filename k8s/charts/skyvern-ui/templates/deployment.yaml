apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skyvern-ui.fullname" . }}
  labels:
    {{- include "skyvern-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "skyvern-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the injected runtime config changes so new env applies.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "skyvern-ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: skyvern-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # NOTE: intentionally NO `command`/`args`. The image entrypoint injects
          # VITE_* runtime config into the prebuilt bundle and serves it. Setting
          # a command (e.g. ["npm","run","start"]) forces a runtime build the
          # production image cannot do and crashloops with "tsc: not found".
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "skyvern-ui.fullname" . }}
          env:
            - name: VITE_SKYVERN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "skyvern-ui.apiKeySecretName" . }}
                  key: {{ .Values.apiKey.existingSecretKey }}
                  optional: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: artifact
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
