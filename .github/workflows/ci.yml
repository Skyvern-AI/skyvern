name: Run tests and pre-commit
# Run this job on pushes to `main`, and for pull requests. If you don't specify
# `branches: [main], then this actions runs _twice_ on pull requests, which is
# annoying.
on:
  workflow_call:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    name: Run tests and pre-commit hooks
    runs-on: ubuntu-latest
    # Service containers to run with `container-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_USER: skyvern
          POSTGRES_DATABASE: skyvern
          POSTGRES_HOST_AUTH_METHOD: trust
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false
      # If you wanted to use multiple Python versions, you'd have specify a matrix in the job and
      # reference the matrixe python version here.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      # Install uv (fast, single-file binary)
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      # Cache uv's download/resolve cache to speed up CI (optional but nice)
      - name: Cache uv global cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: uv-cache-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
      # Cache the project virtualenv (keyed by Python version + lockfile)
      - name: Cache venv
        id: cache-venv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version || '3.11' }}-${{ hashFiles('**/uv.lock') }}
      # Create/refresh the environment (installs main + dev groups)
      - name: Sync deps with uv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          uv lock
          uv sync --group dev
      # Ensure venv is current even on cache hit (cheap no-op if up to date)
      - name: Ensure environment is up to date
        if: steps.cache-venv.outputs.cache-hit == 'true'
        run: |
          uv sync --group dev
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: skyvern-frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: skyvern-frontend
        run: npm ci
      # Finally, run pre-commit.
      - name: Run all pre-commit hooks
        run: uv run pre-commit run --all-files
        env:
          ENABLE_OPENAI: "true"
          OPENAI_API_KEY: "sk-dummy"
          ENABLE_AZURE_GPT4O_MINI: "true"
          AZURE_GPT4O_MINI_DEPLOYMENT: "dummy"
          AZURE_GPT4O_MINI_API_KEY: "dummy"
          AZURE_GPT4O_MINI_API_BASE: "dummy"
          AZURE_GPT4O_MINI_API_VERSION: "dummy"
          AWS_REGION: "us-east-1"
          ENABLE_BEDROCK: "true"
      - name: Run alembic check
        env:
          ENABLE_OPENAI: "true"
          OPENAI_API_KEY: "sk-dummy"
          ENABLE_AZURE_GPT4O_MINI: "true"
          AZURE_GPT4O_MINI_DEPLOYMENT: "dummy"
          AZURE_GPT4O_MINI_API_KEY: "dummy"
          AZURE_GPT4O_MINI_API_BASE: "dummy"
          AZURE_GPT4O_MINI_API_VERSION: "dummy"
          AWS_REGION: "us-east-1"
          ENABLE_BEDROCK: "true"
        run: uv run ./run_alembic_check.sh
      - name: trigger tests
        env:
          ENABLE_OPENAI: "true"
          OPENAI_API_KEY: "sk-dummy"
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
        run: uv run pytest
  fe-lint-build:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./skyvern-frontend
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
      - name: Install Node.js dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Run build
        run: npm run build
  pip-install-and-migrate-smoke:
    name: Pip-install wheel + reproduce stale-settings migration path
    if: false # ACTIVATED in PR A.2.1 after deps are fixed
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: skyvern
          POSTGRES_DB: skyvern
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Install uv (build only)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build wheel
        run: |
          uv build
          ls -la dist/
      - name: Install wheel via plain pip (Bug 2 regression test)
        run: |
          python -m venv /tmp/pip-venv
          /tmp/pip-venv/bin/pip install --upgrade pip
          /tmp/pip-venv/bin/pip install ./dist/skyvern-*.whl
          /tmp/pip-venv/bin/python -c "import skyvern, litellm, fastmcp, dotenv; print('OK')"
      - name: Reproduce Bug 1 stale-settings path
        run: |
          rm -rf ~/.skyvern && mkdir -p ~/.skyvern
          touch ~/.skyvern/data.db
          SQLITE_SIZE_BEFORE=$(stat -c %s ~/.skyvern/data.db 2>/dev/null || stat -f %z ~/.skyvern/data.db)
          mkdir -p /tmp/smoke && cd /tmp/smoke && rm -f .env && touch .env
          unset DATABASE_STRING
          /tmp/pip-venv/bin/python <<'PY'
          # Cache Settings BEFORE setup_postgresql writes DATABASE_STRING
          # (mirrors the quickstart import order that produced the original bug).
          from skyvern.config import Settings, settings  # noqa: F401
          from skyvern.cli.llm_setup import update_or_add_env_var
          from skyvern.utils import migrate_db
          update_or_add_env_var("DATABASE_STRING", "postgresql+psycopg://skyvern@localhost/skyvern")
          migrate_db()
          PY
          SQLITE_SIZE_AFTER=$(stat -c %s ~/.skyvern/data.db 2>/dev/null || stat -f %z ~/.skyvern/data.db)
          echo "SQLite size before/after: $SQLITE_SIZE_BEFORE / $SQLITE_SIZE_AFTER"
          if [ "$SQLITE_SIZE_BEFORE" != "$SQLITE_SIZE_AFTER" ]; then
            echo "FAIL: migration ran against SQLite — stale-settings reload regression"
            exit 1
          fi
      - name: Verify Postgres schema (deterministic post-check)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          psql -h localhost -U skyvern -d skyvern -c "SELECT 1 FROM organizations LIMIT 0"
          psql -h localhost -U skyvern -d skyvern -t -c "SELECT version_num FROM alembic_version" \
            | grep -E '[a-f0-9]+'
